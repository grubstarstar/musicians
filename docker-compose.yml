services:
  postgres:
    image: postgres:16
    container_name: musicians-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: musicians
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - musicians-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d musicians"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  musicians-pgdata:
