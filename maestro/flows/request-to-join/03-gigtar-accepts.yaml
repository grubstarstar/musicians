appId: com.musicians.app
---
# Flow 03 of the request-to-join e2e journey (MUS-71).
# State at entry: sesh is signed in (left over from flow 02).
# - Log sesh out.
# - Log in as gigtar.
# - Navigate to My requests, expand the Bass request and Accept sesh's EoI.
- runFlow: ../../helpers/logout.yaml
- runFlow: ../../helpers/login-gigtar.yaml

- tapOn: "My requests, tab.*"
- assertVisible: "Expressions of interest you've received"

# RequestCard renders the band name as the header, with state pill = OPEN.
# It expands by default (useState(true) in RequestCard) so the EoI row should
# already be visible — no need to toggle. We assert sesh's name is there to
# confirm the EoI rendered. Maestro's text matcher is anchored (see flow 02
# comment) so use a wildcarded pattern — the band name sits inside a
# composite accessibility label on the card.
- assertVisible: ".*The Testers.*"
# Sesh's display name is rendered via formatUserDisplayName, which prefers
# firstName when present — the seed sets firstName="Sesh".
- assertVisible: ".*Sesh.*"

# Accept the EoI. The button's accessibility label is `Accept expression of
# interest from Sesh`; the inner "Accept" Text is hidden from the a11y tree
# by the parent's label. Maestro's anchored regex needs wildcards to match
# inside the composed label — `.*Accept.*` still avoids the Reject button
# (label: "Reject expression of interest from Sesh").
- tapOn: ".*Accept.*"

# After acceptance, the EoI row's state pill renders ACCEPTED.
- assertVisible: ".*Accepted.*"
