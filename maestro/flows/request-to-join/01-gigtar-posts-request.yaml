appId: com.musicians.app
---
# Flow 01 of the request-to-join e2e journey (MUS-71).
# - Reset the test DB to the minimal fixture (gigtar, sesh, The Testers).
# - Launch the app fresh so we always land on the login screen.
# - Sign in as gigtar.
# - Post a `Musician for a band` request: instrument = Bass, band = The Testers.
- runFlow: ../../helpers/reset.yaml
- launchApp:
    clearState: true
- runFlow: ../../helpers/login-gigtar.yaml

# Open the My requests tab (where the "+" entry to post a request lives).
# After tapping the tab the screen shows the "My requests" heading + the
# "Expressions of interest you've received" subheading; assert the
# subheading because it appears only once.
- tapOn: "My requests"
- assertVisible: "Expressions of interest you've received"
# Tap the new-request card (a "+" icon in a pressable card with a11y label
# "Post a new request").
- tapOn:
    accessibilityText: "Post a new request"

# Post Request form. The kind selector has "Musician for a band" pre-selected
# and its blurb is visible — assert the blurb so we know we navigated.
- assertVisible: "I lead a band and want someone to join us."

# The Testers is the only band gigtar is in, so the picker pre-selects it
# (the form initialises selectedBandId when myBands.length === 1). Don't tap
# the field — that opens the dropdown — just confirm it's there.
- assertVisible: "The Testers"

# Fill the instrument field via its placeholder text.
- tapOn: "e.g. Bass"
- inputText: "Bass"
- hideKeyboard

# Submit. There are two "Post request" elements on screen: the heading at
# index 0 and the submit button at index 1.
- tapOn:
    text: "Post request"
    index: 1
# After a successful submit the screen swaps the submit button for "Done".
- assertVisible: "Done"
