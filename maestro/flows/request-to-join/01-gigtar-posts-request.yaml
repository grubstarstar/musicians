appId: com.musicians.app
---
# Flow 01 of the request-to-join e2e journey (MUS-71, updated MUS-68).
# - Reset the test DB to the minimal fixture (gigtar, sesh, The Testers).
# - Ensure the app is in the foreground (see launchApp note below).
# - If a previous run left someone signed in, log them out first so we
#   always start the journey from the login screen.
# - Sign in as gigtar.
# - Post a `Musician for a band` request: instrument = Bass Guitar (via
#   the InstrumentAutocomplete component introduced in MUS-68), band = The Testers.
#
# MUS-68 replaced the free-text instrument TextInput with an autocomplete
# that debounces 200ms and requires selecting a suggestion row to commit an
# instrumentId. Typing alone no longer enables the submit button.
- runFlow: ../../helpers/reset.yaml
# The app is pre-launched by scripts/e2e-sim-setup.sh, which seeds the
# dev-launcher defaults so it auto-connects to Metro. Maestro's own XCTest
# driver install (happens at the start of every run) backgrounds the app,
# so force-relaunch here to put it in a known state. stopApp: true is the
# default, called out for clarity.
- launchApp
# Cold bundle fetch can take 20-40s on the sandboxed sim. Wait explicitly
# before handing off to login-gigtar.yaml (whose default assertVisible
# timeout is 10s). The setup script uninstalls the app + resets the
# keychain before each run, so we always land on the login screen.
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 60000
- runFlow: ../../helpers/login-gigtar.yaml

# Open the My requests tab (where the "+" entry to post a request lives).
# After tapping the tab the screen shows the "My requests" heading + the
# "Expressions of interest you've received" subheading; assert the
# subheading because it appears only once.
# iOS exposes tab buttons as "<Label>, tab, N of M" for VoiceOver.
# Match that pattern so we don't trip over the substring quirk.
- tapOn: "My requests, tab.*"
- assertVisible: "Expressions of interest you've received"
# Tap the new-request card (a "+" icon in a pressable card with a11y label
# "Post a new request").
- tapOn:
    text: "Post a new request"

# Post Request form. Assert the screen title StaticText to confirm we
# navigated. We can't reliably assert on the kind tile's blurb or the
# band picker's selected value — both render as composite/placeholder
# accessibility labels that Maestro can't substring-match against.
# Tracked separately as an a11y follow-up.
- assertVisible: "Post request"

# --- Fill the instrument field via the InstrumentAutocomplete (MUS-68) ---
# The TextInput now has testID "post-request-instrument". Tap it to focus,
# then type a query. The autocomplete debounces 200ms before querying the
# server, so we sleep 250ms after typing to let the suggestion list render.
# Using testID here because the placeholder text ("e.g. Bass") is not
# exposed in the iOS a11y tree — visible text is preferred but unavailable.
- tapOn:
    id: "post-request-instrument"
- inputText: "Bass Guitar"
- sleep: 250

# The suggestion dropdown (testID: instrument-autocomplete-suggestions)
# should now be visible. Assert its presence, then tap the "Bass Guitar"
# row by visible text to commit the instrumentId.
# We tap by visible text — the suggestion row renders the canonical
# instrument name and is the only "Bass Guitar" text on screen at this
# moment. Never tap by testID "instrument-autocomplete-option-<id>" since
# the numeric id suffix is not stable across seed runs.
- assertVisible:
    id: "instrument-autocomplete-suggestions"
- tapOn: "Bass Guitar"

# After tapping a suggestion the dropdown hides and the input displays the
# canonical name. Assert the name is visible to confirm the selection
# committed and the dropdown dismissed.
- assertVisible: "Bass Guitar"

# Dismiss the keyboard by tapping the non-interactive section heading.
# `hideKeyboard` is unreliable on React Native inputs — this is Maestro's
# own recommended workaround.
- tapOn: "INSTRUMENT"

# Submit. The button sits below the fold on this form. `scrollUntilVisible`
# starts its swipe gesture near the bottom of the screen where the tab bar
# lives, which iOS interprets as a tab tap — sending us to the My requests
# tab before the scroll ever happens. Use an explicit mid-screen swipe
# instead, well clear of the tab bar's touch zone (tab bar starts ~y=791
# on a ~874pt viewport, so anything < 70% is safe).
- swipe:
    start: "50%, 65%"
    end: "50%, 20%"
    duration: 400
- tapOn:
    id: "post-request-submit"
# After a successful submit the screen swaps the submit button for "Done".
- assertVisible: "Done"
