appId: com.musicians.app
---
# Flow 02 of the request-to-join e2e journey (MUS-71, updated MUS-68).
# State at entry: gigtar is signed in (left over from flow 01).
# - Log gigtar out via the drawer.
# - Log in as sesh.
# - Navigate to Notices, open The Testers' Bass Guitar request, and Express interest.
#
# MUS-68: the instrument is now stored as an instrumentId and displayed via the
# server-denormalised instrumentName ("Bass Guitar"). Updated selectors accordingly.
- runFlow: ../../helpers/logout.yaml
- runFlow: ../../helpers/login-sesh.yaml

# Notices tab: shows every open request that isn't the caller's. The Testers
# request gigtar posted is the only row. Maestro's text matcher is anchored
# (regex must match the whole value, not a substring), and the row Pressable
# exposes the composed accessibility label `Open request from <band> for
# <instrument>` rather than a standalone "The Testers" text node. Match the
# composed label so both visibility + tap hit the same element.
- tapOn: "Notices, tab.*"
- assertVisible: "Bands looking for musicians right now"
- assertVisible: "Open request from The Testers for Bass Guitar"
- tapOn: "Open request from The Testers for Bass Guitar"

# Detail screen for the request. The instrument is rendered as the
# `detailsHeading` ("Bass Guitar") and the `extraRows` include "Slots 0 / 1 filled".
- assertVisible: "Bass Guitar"
- assertVisible: "Looking for"
# Submit: the instructions allow leaving the optional note empty.
- tapOn: "Express interest"
- assertVisible: "Interest sent"
