appId: com.musicians.app
---
# Flow 01 of the promoter-home e2e journey (MUS-83, updated MUS-97).
# Entry state: fresh app launch, no one signed in.
# Source of truth: seedE2E (runs against the musicians_test DB via /test/reset).
# This flow exercises the PromoterHome screen's "My promoter groups" section:
#   - Call /test/reset to seed the minimal fixture plus the promoter-home slice:
#     user promoter1 (password123, promoter role), group "Test Promotions",
#     venue "Test Hall" (1 Test Lane, Testville VIC 3000).
#   - Log in as promoter1.
#   - Switch context to "Promoter" via the app drawer.
#   - Assert the "My promoter groups" section header is visible.
#   - Assert "Test Promotions" (the seeded group name) is visible.
#   - Assert "Test Hall" (the seeded venue linked to that group) is visible.

# Reset the test DB to the seedE2E fixture before any UI interaction. This
# includes the promoter-home slice added in MUS-97 (promoter1, Test Promotions,
# Test Hall), so the flow is deterministic against pnpm e2e:server.
- runFlow: ../../helpers/reset.yaml

# Bring the app to the foreground in a known state. No clearState — that wipes
# the dev-client's saved server URL and drops us at the dev launcher instead of
# the app.
- launchApp

# Cold bundle fetch can take 20-40s on a sandboxed simulator. Wait explicitly
# before interacting with the login screen.
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 60000

# If a previous run left someone signed in, log them out so we start clean.
- runFlow:
    when:
      visible: "Open profile menu"
    file: ../../helpers/logout.yaml

# Log in as the seeded promoter user (promoter1, inserted by seedE2E).
# firstName is null so UserContext falls back to the username in the greeting.
- assertVisible: "Sign in to continue"
- tapOn:
    id: "login-username"
- inputText: "promoter1"
- tapOn:
    id: "login-password"
- inputText: "password123"
- tapOn:
    id: "login-submit"

# After login the home screen renders the welcome heading. Because firstName is
# null, UserContext uses the username as the display name.
- assertVisible: "Hello promoter1"

# The app defaults to "musician" context on login. Switch to "Promoter" via
# the app drawer: tap the profile-menu button (top-right of the Home screen),
# then tap the "Promoter" chip in the context picker.
- tapOn:
    text: "Open profile menu"
- tapOn: "Promoter"

# Dismiss the drawer by tapping the Home tab label. The tab bar is above the
# drawer's touch-area and is always reachable.
- tapOn: "Home, tab.*"

# Assert the "My promoter groups" section header is now visible. This testID is
# present only when the user has one or more promoter groups (rendered by
# PromoterHome, wired in MUS-83). It is the primary gate assertion for this AC.
- assertVisible:
    id: "promoter-groups-section-header"

# Assert the seeded group name is visible. The row is a Pressable with
# accessibilityLabel="Open <group name>" (MUS-100); iOS exposes this as a
# single a11y element so the exact matchable string on the row is
# "Open Test Promotions" rather than "Test Promotions".
# The row's venues ("Test Hall", "1 Test Lane, …") are still visually rendered
# but not individually accessible — flow 02's detail-screen assertions cover
# the venue presence, so we only verify the row itself here.
- assertVisible: "Open Test Promotions"

# Leave the app in a known logged-out state so the next flow in the journey
# starts from the login screen without racing its own conditional logout.
- runFlow: ../../helpers/logout.yaml
