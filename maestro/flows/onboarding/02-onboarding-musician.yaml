appId: com.musicians.app
---
# Flow 02 of the onboarding e2e journey (MUS-89, extended in MUS-92, MUS-90).
# Entry state: flow 01 (01-signup.yaml) has run — "newbie" account exists in
# the test DB with password "abcd1234" and roles=[].
# This flow exercises the musician path through the role-picker and the full
# musician step-2 screen (MUS-90):
#   - Assert the role-picker screen is visible.
#   - Verify Next is disabled before a role is selected.
#   - Tap "As a musician" tile.
#   - Tap Next and assert the app navigates to the musician step-2 screen.
#   - Verify Next on step-2 is disabled until an option is selected.
#   - Exercise all four step-2 options in turn:
#       "Create a new band"  → /create-entity?entityType=band&memberMode=band
#       "Join existing band" → /onboarding/join-band (placeholder)
#       "I'm a solo artist"  → /create-entity?entityType=band&memberMode=solo
#       "Session musician"   → /onboarding/session-musician
#   - Verify back-and-return preserves the selected tile (join-band path, the
#     easiest case: the placeholder has a Back testID that returns to step-2).
# MUS-92: exercises the create-entity sub-flow for bands and solo artists,
# reached via in-app navigation through step-2 now that MUS-90 has landed.
#   Band-mode:  name input → submit → band profile with "Add members" CTA →
#               dismiss CTA → CTA gone.
#   Solo-mode:  name input → submit → band profile without "Add members" CTA.

# Re-launch the app with clearKeychain so any stale SecureStore token from a
# previous run (e.g. sesh's token from flow 03) is wiped before the auth
# context fires. Bare launchApp leaves the keychain intact, which is fragile:
# a stale or invalid token causes fetchMe to return null and the app lands on
# the login screen instead of the role-picker. clearKeychain: true is the
# pattern established in flow 03 (commit 0dcb9ef / 4c927e0) — it does NOT
# wipe the dev-client's saved server URL (that lives in NSUserDefaults, not
# the keychain), so the Metro bundler URL survives.
- launchApp:
    clearKeychain: true

# Allow the app's animation/initialization phase to complete before querying
# the accessibility tree. Without this, XCTest can return kAXErrorInvalidUIElement
# (HTTP 500) and crash the subsequent conditional-logout check (same issue
# diagnosed in commit ec53b7f for flow 03).
- waitForAnimationToEnd

# Belt-and-braces: if some other state survives (e.g. a previous run that did
# not use keychain storage), log out before logging in as newbie.
- runFlow:
    when:
      visible: "Open profile menu"
    file: ../../helpers/logout.yaml

# clearKeychain wiped the keychain, so the app is now showing the login screen.
# Wait explicitly before interacting — cold bundle fetch can take 20-40s.
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 60000

# Log in as newbie. Flow 01 created this account with password "abcd1234".
# After login, newbie has roles=[] so the (app)/_layout.tsx guard redirects
# to /onboarding/role-picker rather than Home.
- tapOn:
    id: "login-username"
- inputText: "newbie"
- tapOn:
    id: "login-password"
- inputText: "abcd1234"
- tapOn:
    id: "login-submit"

# Wait for the role-picker screen. The auth guard in (app)/_layout.tsx checks
# roles.length === 0 and issues Redirect href="/onboarding/role-picker".
# The title "What brings you here?" is the most stable text anchor on this screen.
- extendedWaitUntil:
    visible: "What brings you here?"
    timeout: 30000

# Belt-and-braces: confirm we are definitely on the role-picker, not some other
# screen that might coincidentally contain similar text.
- assertVisible:
    id: "onboarding-role-picker"

# Verify client-side guard: Next must be disabled before any tile is selected.
# A tap on a disabled Pressable is a no-op, so the screen should remain on the
# role-picker after this tap.
- tapOn:
    id: "onboarding-role-next"
- assertVisible: "What brings you here?"

# Select the "As a musician" radio tile.
# testID used instead of visible text because the tile is a composite
# GenericElement; Maestro substring-matching on composite labels is unreliable
# (same quirk as kind-tiles in the Post Request flow).
- tapOn:
    id: "onboarding-role-musician"

# Confirm "As a musician" copy is visible (tile renders its label as a child
# text element even though the container is composite).
- assertVisible: "As a musician"

# Tap Next. The button is now enabled (a role has been selected). The mutation
# fires, sets the role server-side, and router.replace navigates to
# /onboarding/musician on success.
- tapOn:
    id: "onboarding-role-next"

# Assert we have arrived on the musician step-2 screen (MUS-90).
# The stub testID "onboarding-musician-stub" is replaced by the real screen
# anchor "onboarding-musician-step2" — the SafeAreaView root of the four-option
# screen. Asserting this ID confirms the role-picker → step-2 navigation fired.
- assertVisible:
    id: "onboarding-musician-step2"

# =============================================================================
# Step-2 guard: Next disabled until an option is selected
# =============================================================================
# The Next button on step-2 must be disabled (no-op) before any tile is tapped.
# Tap it and assert the step-2 screen is still visible (no navigation occurred).
- tapOn:
    id: "onboarding-musician-step2-next"
- assertVisible:
    id: "onboarding-musician-step2"

# =============================================================================
# Step-2 option 2: "Join existing band" — back-and-return preservation test
# =============================================================================
# We test join-band first because its placeholder has an explicit Back testID
# (onboarding-join-band-back) that makes the back-and-return AC easiest to
# verify without relying on hardware/OS back gestures.
#
# Select the "Join an existing band" tile.
- tapOn:
    id: "onboarding-musician-step2-join-band"

# Tap Next. The button is now enabled. router.push navigates to
# /onboarding/join-band (the placeholder screen added in MUS-90).
- tapOn:
    id: "onboarding-musician-step2-next"

# Assert we have reached the join-band placeholder screen.
- extendedWaitUntil:
    visible:
      id: "onboarding-join-band-stub"
    timeout: 10000

# Tap the placeholder's Back button. router.back() pops back to step-2.
# Because the navigator used router.push (not replace), the step-2 component
# remains mounted and its useState selection is preserved.
- tapOn:
    id: "onboarding-join-band-back"

# Assert we are back on step-2 — the screen root is visible again.
- assertVisible:
    id: "onboarding-musician-step2"

# Assert the join-band tile is still highlighted (state preserved via push/back).
# Tapping on a composite tile in Maestro verifies it is present in the a11y tree;
# we use assertVisible on the testID to confirm it is rendered and accessible.
- assertVisible:
    id: "onboarding-musician-step2-join-band"

# =============================================================================
# Step-2 option 4: "Session musician"
# =============================================================================
# Tap the "Session musician" tile and navigate forward. The destination is
# /onboarding/session-musician (MUS-93). We assert on the instrument input
# testID (from flow 03) to confirm the screen was reached.
- tapOn:
    id: "onboarding-musician-step2-session-musician"

- tapOn:
    id: "onboarding-musician-step2-next"

# Wait for the session-musician screen. The instrument input testID is the
# most stable above-fold anchor from MUS-93 (see flow 03 for full coverage).
- extendedWaitUntil:
    visible:
      id: "session-musician-instrument-input"
    timeout: 10000

# Navigate back to step-2 via the session-musician screen's custom back button.
# The onboarding Stack (_layout.tsx) sets gestureEnabled: false and
# headerShown: false, so Maestro's bare `- back` (which targets the iOS swipe /
# hardware back) has no target. Tap the back button by testID — the
# accessibilityLabel-only selector proved unreliable on small chevron
# Pressables in a ScrollView.
- tapOn:
    id: "session-musician-go-back"

# Assert we are back on step-2 with the session-musician tile still selected.
- assertVisible:
    id: "onboarding-musician-step2"
- assertVisible:
    id: "onboarding-musician-step2-session-musician"

# =============================================================================
# MUS-92: Step-2 option 1: "Create a new band" → create-entity (band mode)
# =============================================================================
# Select "Create a new band" and tap Next. The destination is
# /create-entity?entityType=band&memberMode=band. MUS-90 wires this navigation
# via in-app router.push — no deep-link workaround needed now that step-2 lands.
- tapOn:
    id: "onboarding-musician-step2-create-band"

- tapOn:
    id: "onboarding-musician-step2-next"

# Wait for the create-entity form to appear. The screen heading testID is the
# most stable anchor — it is always visible above the fold regardless of
# entityType/memberMode (the text changes but the testID stays fixed).
- extendedWaitUntil:
    visible:
      id: "create-entity-heading"
    timeout: 15000

# Verify the submit button is disabled before any name is entered.
# A tap on a disabled Pressable is a no-op; the heading should still be visible.
- tapOn:
    id: "create-entity-submit"
- assertVisible:
    id: "create-entity-heading"

# Enter a band name. The input is autofocused on mount but we tap the testID
# explicitly to be safe (navigating in from step-2 sometimes shifts focus).
- tapOn:
    id: "create-entity-name-input"
- inputText: "The Testers (E2E Band)"

# Dismiss the keyboard by tapping the screen heading.
# hideKeyboard is unreliable on React Native — tapping a non-interactive element
# is the established project workaround (see INSTRUMENTS tap in flow 03).
# The heading is a Text node whose testID resolves to a non-interactive element.
- tapOn:
    id: "create-entity-heading"

# Submit the form. The submit button is now enabled (trimmed name is non-empty).
# On success, bands.create runs in a transaction, then router.replace navigates
# to /band/<id>?new=1. The ?new=1 flag is stripped on first render via
# router.setParams, so we must NOT assert on the URL; assert the CTA instead.
- tapOn:
    id: "create-entity-submit"

# Assert the band profile is showing with the "Add members" CTA card.
# The CTA is visible only when (a) ?new=1 was present at mount AND (b) the
# viewer is the entity creator. newbie just created this band so both conditions
# hold. We allow up to 10s for the tRPC mutation + navigation to settle.
- extendedWaitUntil:
    visible:
      id: "add-members-cta"
    timeout: 10000

# Dismiss the CTA via the close button. After dismissal the card is removed from
# the render tree — it must not reappear on this screen visit.
- tapOn:
    id: "add-members-cta-dismiss"

# Assert the CTA is no longer visible. assertNotVisible uses the testID directly.
# (Maestro assertNotVisible with an id selector checks absence from the a11y tree.)
- assertNotVisible:
    id: "add-members-cta"

# =============================================================================
# MUS-92: Step-2 option 3: "I'm a solo artist" → create-entity (solo mode)
# =============================================================================
# In memberMode=solo the entity is created with exactly one member and the app
# navigates to the band profile WITHOUT ?new=1. Therefore the "Add members" CTA
# must NOT appear. We exercise this by navigating back to step-2 from the band
# profile, selecting the solo-artist tile, and going through create-entity again.
#
# We are currently on the band profile after the band-mode sub-flow. Tap the
# band-profile back button to return to step-2. The create-entity screen used
# router.replace to navigate to the band profile, so the stack at this point
# is just step-2 → band-profile (one back, not two). Maestro's bare `- back`
# is unreliable on iOS (no hardware back), so we use the band-profile-go-back
# testID added on the back chevron Pressable.
- tapOn:
    id: "band-profile-go-back"

# Wait for step-2 to be visible again before tapping.
- extendedWaitUntil:
    visible:
      id: "onboarding-musician-step2"
    timeout: 10000

# Select the "I'm a solo artist" tile.
- tapOn:
    id: "onboarding-musician-step2-solo-artist"

# Tap Next. Routes to /create-entity?entityType=band&memberMode=solo.
- tapOn:
    id: "onboarding-musician-step2-next"

# Wait for the create-entity form. Same heading testID as band mode.
- extendedWaitUntil:
    visible:
      id: "create-entity-heading"
    timeout: 15000

# Enter a solo artist name. Use a distinct name from the band-mode run so the
# two profiles are clearly separate in the test fixture (no uniqueness constraint
# exists, but a distinct name makes failures easier to diagnose).
- tapOn:
    id: "create-entity-name-input"
- inputText: "Newbie Solo"

# Dismiss keyboard via the heading before submitting.
- tapOn:
    id: "create-entity-heading"

# Submit. For memberMode=solo the procedure routes to /band/<id> without ?new=1.
# The Add members CTA must therefore never appear.
- tapOn:
    id: "create-entity-submit"

# Wait for the band profile to load. The band profile will show the entity name
# as visible text — asserting that confirms navigation succeeded and the correct
# profile is showing.
- extendedWaitUntil:
    visible: "Newbie Solo"
    timeout: 10000

# Assert the "Add members" CTA is absent. This is the key AC assertion for
# solo mode: memberMode=solo → no ?new=1 → CTA card not rendered.
- assertNotVisible:
    id: "add-members-cta"
