appId: com.musicians.app
---
# Flow 05 of the onboarding e2e journey (MUS-94).
# Exercises the onboarding-resume AC: the (app)/_layout.tsx gate must
# route users to the correct screen on launch based on server-derived
# onboarding progress, NOT a client-only flag.
#
# Three seeded mid-onboarded users (see seedE2E.ts MUS-94 fixture):
#   - `newbie`       roles=[]               → /onboarding/role-picker
#   - `onboardmus`   roles=['musician']     → /onboarding/musician
#   - `onboardprom`  roles=['promoter']     → /onboarding/promoter
#   - `onboarddone`  musician + band member → home (step=complete)
# All four use password "abcd1234" matching the newbie convention.
#
# The flow runs reset.yaml up front so the seed is deterministic, then
# performs four login/logout cycles, asserting the correct landing screen
# for each resume state.

# Reset the DB so the seed users are all present and mid-onboarded users
# haven't accumulated state from earlier flows (flow 01/02/03/04 runs
# before this one and each advances their onboarding).
- runFlow: ../../helpers/reset.yaml

# Clear keychain and launch fresh. clearKeychain: true wipes any stale
# SecureStore token from a previous flow while preserving the dev client's
# server URL (NSUserDefaults, not keychain).
- launchApp:
    clearKeychain: true

# Allow the initial animation to complete before interacting with the
# accessibility tree.
- waitForAnimationToEnd

# Belt-and-braces: if a previous flow left a user signed in, log out first.
- runFlow:
    when:
      visible: "Open profile menu"
    file: ../../helpers/logout.yaml

# Wait for the login screen. Cold bundle fetch can take 20-40s.
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 60000

# =============================================================================
# Case 1: newbie (roles=[]) → role-picker
# =============================================================================
# Log in as newbie. The gate's getResumeStep query returns 'role-picker'
# because users.roles is empty, so the app guard redirects away from home
# before any home UI renders.
- tapOn:
    id: "login-username"
- inputText: "newbie"
- tapOn:
    id: "login-password"
- inputText: "abcd1234"
- tapOn:
    id: "login-submit"

# Wait for the role-picker screen. The title is the most stable anchor.
- extendedWaitUntil:
    visible: "What brings you here?"
    timeout: 30000

# Belt-and-braces: confirm via the root testID.
- assertVisible:
    id: "onboarding-role-picker"

# Critical AC: the home screen must NOT be visible. The Hello-banner text
# is specific to Home and not rendered by the wizard. (If the gate failed
# and home rendered briefly before the redirect, this would fail
# intermittently.)
- assertNotVisible: "Hello newbie"

# Re-launch the app and confirm the gate picks up the same state on a
# cold launch — this is the cross-session persistence AC. clearKeychain:
# false keeps the token so we land back at the gate, not the login screen.
- launchApp:
    clearKeychain: false

# Wait again for the role-picker — the stored token + fresh /me + resume
# step query still returns 'role-picker'.
- extendedWaitUntil:
    visible:
      id: "onboarding-role-picker"
    timeout: 30000

# =============================================================================
# Transition: log out of newbie via the wizard segment
# =============================================================================
# The wizard has no logout button (drawer lives in (app)), so we restart
# with clearKeychain: true to wipe the token and drop back to /login.
- launchApp:
    clearKeychain: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 60000

# =============================================================================
# Case 2: onboardmus (roles=['musician'], no step-2) → musician step-2
# =============================================================================
# Log in as onboardmus. The gate must skip role-picker (musician is
# already on users.roles) and redirect straight to /onboarding/musician.
- tapOn:
    id: "login-username"
- inputText: "onboardmus"
- tapOn:
    id: "login-password"
- inputText: "abcd1234"
- tapOn:
    id: "login-submit"

# Wait for the musician step-2 root testID.
- extendedWaitUntil:
    visible:
      id: "onboarding-musician-step2"
    timeout: 30000

# Confirm the role-picker screen is NOT visible — the gate must skip it
# when the user already has a role.
- assertNotVisible: "What brings you here?"

# Confirm home is NOT visible — pre-step-2 users must not see home chrome.
- assertNotVisible: "Hello onboardmus"

# =============================================================================
# Transition: log out of onboardmus
# =============================================================================
- launchApp:
    clearKeychain: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 60000

# =============================================================================
# Case 3: onboardprom (roles=['promoter'], no step-2) → promoter step-2
# =============================================================================
- tapOn:
    id: "login-username"
- inputText: "onboardprom"
- tapOn:
    id: "login-password"
- inputText: "abcd1234"
- tapOn:
    id: "login-submit"

# Wait for the promoter step-2 root testID.
- extendedWaitUntil:
    visible:
      id: "onboarding-promoter-step2"
    timeout: 30000

# Belt-and-braces: no role-picker (promoter role already set), no home chrome.
- assertNotVisible: "What brings you here?"
- assertNotVisible: "Hello onboardprom"

# =============================================================================
# Transition: log out of onboardprom
# =============================================================================
- launchApp:
    clearKeychain: true

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 60000

# =============================================================================
# Case 4: onboarddone (musician + band member) → home (step=complete)
# =============================================================================
# Log in as onboarddone. The gate's getResumeStep query returns 'complete'
# because onboarddone has a band_members row (via seedE2E), so the app
# shell mounts and home renders.
- tapOn:
    id: "login-username"
- inputText: "onboarddone"
- tapOn:
    id: "login-password"
- inputText: "abcd1234"
- tapOn:
    id: "login-submit"

# Wait for home. The Hello banner is the most stable home anchor — it's
# always rendered at the top of the musician home screen and the text
# includes the username verbatim. This is the inverse of the earlier
# assertNotVisible checks.
- extendedWaitUntil:
    visible: "Hello onboarddone"
    timeout: 30000

# Confirm the wizard is NOT visible — a "done" user must never see it.
- assertNotVisible: "What brings you here?"
- assertNotVisible:
    id: "onboarding-musician-step2"

# Cross-session persistence: re-launch and confirm home still renders
# (step still 'complete'). This is the "logging out and back in on the
# same device preserves the resume point" AC applied to the
# happy-path end state.
- launchApp:
    clearKeychain: false

- extendedWaitUntil:
    visible: "Hello onboarddone"
    timeout: 30000
